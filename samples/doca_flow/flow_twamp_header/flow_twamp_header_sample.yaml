          - Ether(src="ca:fe:01:ca:fe:02", dst="ff:ff:ff:ff:ff:ff")/IP()/UDP(sport=1234,dport=7777)/Raw(load=b'Sent from port 0 and contains seq_num followed by hardware timestamp')
