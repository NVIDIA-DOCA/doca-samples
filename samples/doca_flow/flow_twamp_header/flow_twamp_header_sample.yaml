number_of_ports: 1
mode_args:
  - vnf
fw_config:
  FLEX_PARSER_PROFILE:
    - 4
  PROG_PARSE_GRAPH:
    - 1
  REAL_TIME_CLOCK_ENABLE:
    - 1
ports_description:
  port_0: doca_dev
description: "This sample sends 10 UDP packets with hardware timestamp inserted into payload only when UDP dest_port = 7777.
              Sample Command Line: ./build/samples/doca_flow_twamp_header -- -a pci/03:00.0,dv_flow_en=2 -l 60"
use_cases:
  - name: "Flow twamp header use case #1"
    args: ""
    stages:
      - name: "Posting TWAMP packets"
validation:
  - type: packet
    expected_packets:
      - forwarding_port: 0
        packets:
          - Ether(src="ca:fe:01:ca:fe:02", dst="ff:ff:ff:ff:ff:ff")/IP()/UDP(sport=1234,dport=7777)/Raw(load=b'Sent from port 0 and contains seq_num followed by hardware timestamp')
          - Ether(src="ca:fe:01:ca:fe:02", dst="ff:ff:ff:ff:ff:ff")/IP()/UDP(sport=1234,dport=7777)/Raw(load=b'Sent from port 0 and contains seq_num followed by hardware timestamp')
