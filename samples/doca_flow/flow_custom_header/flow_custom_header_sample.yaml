number_of_ports: 1
mode_args:
  - vnf
fw_config:
  FLEX_PARSER_PROFILE:
    - 4
  PROG_PARSE_GRAPH:
    - 1
ports_description:
  port_0: doca_dev
description: "This sample receives a packet, parses the custom headers, does match on these ones,
              sets metadata, and receives and shows packets with data and metadata value.
              Sample Command Line: ./build/samples/doca_flow_custom_header -- -a pci/82:00.0 -l 60 -i 1000"
use_cases:
  - name: "Flow loopback use case #1"
    args: ""
    stages:
      - name: "Sending packets iteration 1"
        packets_to_send:
          - receiving_port: 0
            packets:
              - Ether()/IP()/UDP(dport=4500)/Raw(b'\x00\x00\x00\x01\x00\x00\x00\x00\x00\x00\x00\x00')
              - Ether()/IP()/UDP(dport=4501)/TCP(sport=0x34, dport=0x12)/Raw(b'\x00\x00\x00\x01')
              - Ether()/IP()/UDP(dport=4502)/GENEVE(version=0, optionlen=2, oam=0, critical=0, reserved=0, proto=25944, vni=0x010203, reserved2=0, options=b'\x01\x32\x01\x01\x12\x34\x56\x78')/Raw(b'\x00\x00\x00\x01')
        validation:
          - type: dump
            expected_text:
              - "Packet 00000211 meta 10000 data 01 02 03 04"
              - "Packet 00000211 meta 20000 data 00 34 00 12 00 00 00 00 00 00 00 00 50 02 20 00 00 00 00 00 00 00 00 01"
              - "Packet 00000211 meta 30008 data 02 00 65 58 01 02 03 00 01 32 01 01 12 34 56 78 00 00 00 01"

